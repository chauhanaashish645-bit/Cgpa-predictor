<!DOCTYPE html>
<html>
<head>
    <title>CGPA Predictor</title>

    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .box {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
        animation: fadeIn 0.8s ease-in-out;
    }

    /* 🔥 Big emoji */
    .emoji {
        font-size: 60px;
        margin-bottom: 10px;
    }

    h2 {
        margin-bottom: 15px;
        color: #333;
    }

    input {
        padding: 12px;
        width: 90%;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px #4CAF50;
    }

    button {
        padding: 12px 25px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #45a049;
        transform: scale(1.05);
    }

    h3 {
        margin-top: 20px;
        color: #222;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
    </style>
</head>

<body>

<div class="box">

    <!-- 😂 Big Laughing Emoji -->
    <div class="emoji">😂</div>

    <h2>CGPA Predictor</h2>

    <form method="POST">
        <input type="number" step="0.01" name="package" placeholder="Enter Package (LPA)" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction is not none %}
        <h3>🎯 Predicted CGPA: {{ prediction }}</h3>
    {% endif %}

</div>

</body>
</html>
