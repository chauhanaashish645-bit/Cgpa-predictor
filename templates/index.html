<!DOCTYPE html>
<html>
<head>
    <title>CGPA Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1;
            pointer-events: none;
        }

        .landing {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            margin-bottom: 20px;
        }

        .door {
            width: 160px;
            height: 240px;
            margin: auto;
            background: linear-gradient(145deg, #8B4513, #5a2d0c);
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .door:hover {
            transform: scale(1.05);
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 320px;
            position: relative;
            z-index: 2;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- Landing Screen (hide after prediction OR after click) -->
<div class="landing {% if prediction is not none %}hidden{% endif %}" id="landing">
    <div class="title">CGPA Predictor</div>
    <div class="subtitle">Click the door to continue</div>
    <div class="door" onclick="openApp()"></div>
</div>

<!-- Prediction Screen (show always after click OR after prediction) -->
<div class="box {% if prediction is none %}hidden{% endif %}" id="appBox">
    <h2>CGPA Predictor</h2>

    <form method="POST">
        <input type="number" step="0.01" name="package" placeholder="Enter Package (LPA)" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction is not none %}
        <h3>🎯 Predicted CGPA: {{ prediction }}</h3>
    {% endif %}
</div>

<script>
function openApp() {
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
}
</script>

</body>
</html>
